<!DOCTYPE html>
<html lang="es" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Carta digital After Office Resto-Bar — menú optimizado para mesa y código QR.">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="noindex">
  <title>Carta Digital · After Office Futrono</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%230a0a0a' width='32' height='32' rx='4'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='%23fbbf24' font-family='sans-serif' font-size='14' font-weight='700'%3EAO%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            playfair: ['"Playfair Display"', 'Georgia', 'serif'],
            outfit: ['Outfit', 'system-ui', 'sans-serif'],
            oswald: ['Oswald', 'system-ui', 'sans-serif'],
            lato: ['Lato', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400;600&family=Lato:wght@400;700&family=Montserrat:wght@800&family=Oswald:wght@400;600;700&family=Outfit:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/demos.css">
  <link rel="stylesheet" href="./css/ux.css">
  <link rel="stylesheet" href="./css/mobile.css">
</head>
<body class="page-enter carta-page carta-page--classic bg-neutral-950 text-stone-100 font-lato antialiased pb-24">

  <header class="carta-header">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <a id="carta-back" href="index.html" class="carta-back">← Volver</a>
      <div id="carta-brand" class="brand-wordmark brand-wordmark--sm brand-wordmark--classic text-center flex-1" aria-label="After Office Futrono">
        <span class="brand-wordmark__stack">
          <span class="brand-wordmark__condensed">After</span>
          <span class="brand-wordmark__condensed">Office</span>
        </span>
      </div>
      <span class="w-12" aria-hidden="true"></span>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 pt-5 pb-6">
    <div class="carta-hero-mini">
      <span id="carta-pill" class="carta-hero-mini__pill">Pide desde tu mesa</span>
      <h1 id="carta-title" class="font-playfair text-2xl text-amber-100 font-bold carta-title">Carta Digital</h1>
      <p id="carta-subtitle" class="text-stone-500 text-sm mt-1">Coctelería · Cervezas · Burgers · Tablas</p>
    </div>

    <div class="carta-sticky-tools">
    <div class="carta-search-wrap mb-3">
      <input type="search" id="carta-search" class="carta-search" placeholder="Buscar plato o bebida…" autocomplete="off" enterkeyhint="search">
    </div>

    <div id="carta-tabs" class="carta-tabs mb-0" role="tablist" aria-label="Categorías de la carta"></div>
    </div>

    <div id="carta-list" class="carta-list mt-4" role="tabpanel" aria-live="polite"></div>

    <p class="text-center text-stone-600 text-xs mt-8 leading-relaxed">
      Precios referenciales · consulta disponibilidad con tu garzón.<br>
      <a id="carta-foot-link" href="index.html" class="carta-foot-link transition">Volver al demo</a>
    </p>
  </main>

  <div class="wa-fab wa-fab--carta" aria-label="Llamar garzón">
    <a id="carta-wa" href="#" target="_blank" rel="noopener noreferrer" class="wa-fab__btn" aria-label="Llamar garzón por WhatsApp">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>
    <span class="wa-fab__tooltip font-lato">Llamar Garzón</span>
  </div>

  <script defer src="./js/images.js"></script>
  <script defer src="./js/menu-data.js"></script>
  <script defer src="./js/carta.js"></script>
</body>
</html>
