<!DOCTYPE html>
<html lang="es" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Menú nocturno After Office Resto-Bar — carta digital para mesa y código QR.">
  <meta name="theme-color" content="#000000">
  <title>Menú Nocturno · After Office Futrono</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%23000' width='32' height='32' rx='4'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='%2322d3ee' font-family='sans-serif' font-size='14' font-weight='700'%3EAO%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ['Outfit', 'system-ui', 'sans-serif'],
            lato: ['Lato', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/demos.css">
  <link rel="stylesheet" href="./css/ux.css">
  <link rel="stylesheet" href="./css/mobile.css">
  <link rel="stylesheet" href="./css/sitio.css?v=neon-pulse">
</head>
<body class="site-neon carta-page carta-page--neon bg-black text-stone-100 font-outfit antialiased pb-24">

  <header class="carta-header carta-header--neon">
    <div class="max-w-lg mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <a id="carta-back" href="index.html#inicio" class="carta-back">← Volver</a>
      <a id="carta-brand" href="index.html#inicio" class="brand-wordmark brand-wordmark--sm brand-wordmark--neon text-center flex-1" aria-label="After Office Futrono — inicio">
        <span class="brand-wordmark__stack">
          <span class="brand-wordmark__condensed">After</span>
          <span class="brand-wordmark__condensed">Office</span>
        </span>
      </a>
      <span class="w-12" aria-hidden="true"></span>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 pt-5 pb-6">
    <div class="carta-hero-mini">
      <span id="carta-pill" class="section-eyebrow carta-hero-mini__pill">Carta nocturna</span>
      <h1 id="carta-title" class="font-outfit text-2xl sm:text-3xl font-bold carta-title mb-2">
        <span class="neon-text-cyan">Menú</span> <span class="text-fuchsia-400 neon-text-magenta">Nocturno</span>
      </h1>
      <p id="carta-subtitle" class="text-stone-400 text-sm mt-1 font-lato">Carta completa · Comida, tragos, cervezas y más</p>
    </div>

    <div class="carta-sticky-tools carta-sticky-tools--compact">
      <div class="carta-search-wrap">
        <span class="carta-search-icon" aria-hidden="true">
          <svg class="carta-search-icon__svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
        </span>
        <input type="search" id="carta-search" class="carta-search" placeholder="Buscar plato o bebida…" autocomplete="off" enterkeyhint="search">
      </div>
      <div class="carta-nav-row" id="carta-nav-row">
        <div class="carta-tabs-wrap" data-carta-tabs-wrap>
          <button type="button" class="carta-tabs-scroll carta-tabs-scroll--prev" data-carta-scroll="prev" aria-label="Categorías anteriores" hidden>
            <span aria-hidden="true">‹</span>
          </button>
          <div id="carta-tabs" class="carta-tabs" role="tablist" aria-label="Categorías de la carta"></div>
          <button type="button" class="carta-tabs-scroll carta-tabs-scroll--next" data-carta-scroll="next" aria-label="Más categorías" hidden>
            <span aria-hidden="true">›</span>
          </button>
        </div>
        <button type="button" id="carta-sections-btn" class="carta-sections-btn" aria-haspopup="dialog" aria-expanded="false" aria-controls="carta-sections-sheet" aria-label="Ver todas las secciones">
          <svg class="carta-sections-btn__icon" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>

    <div id="carta-list" class="carta-list mt-3" role="tabpanel" aria-live="polite"></div>

    <p class="text-center text-stone-500 text-xs mt-8 leading-relaxed font-lato">
      Precios referenciales · consulta disponibilidad con tu garzón.<br>
      <a id="carta-foot-link" href="index.html#inicio" class="carta-foot-link btn-cta btn-cta--neon-outline inline-flex mt-4 text-sm">Volver al sitio</a>
    </p>
  </main>

  <div class="wa-fab wa-fab--carta" aria-label="Llamar garzón">
    <a id="carta-wa" href="#" target="_blank" rel="noopener noreferrer" class="wa-fab__btn" aria-label="Llamar garzón por WhatsApp">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>
    <span class="wa-fab__tooltip font-lato">Llamar Garzón</span>
  </div>

  <div id="carta-sections-sheet" class="carta-sheet" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="carta-sheet-title">
    <div class="carta-sheet__backdrop" data-carta-sheet-close tabindex="-1"></div>
    <div class="carta-sheet__panel" role="document">
      <div class="carta-sheet__handle" aria-hidden="true"></div>
      <div class="carta-sheet__header">
        <h2 id="carta-sheet-title" class="carta-sheet__title font-outfit">Todas las secciones</h2>
        <button type="button" class="carta-sheet__close" data-carta-sheet-close aria-label="Cerrar">×</button>
      </div>
      <ul id="carta-sections-list" class="carta-sheet__list font-lato"></ul>
    </div>
  </div>

  <script defer src="./js/images.js"></script>
  <script defer src="./js/menu-data.js"></script>
  <script defer src="./js/carta.js?v=full-menu"></script>
</body>
</html>
